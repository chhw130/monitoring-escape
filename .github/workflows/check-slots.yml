name: Check Keyescape Slots

on:
  workflow_dispatch:          # cron-job.org에서 트리거

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore last slots cache
        uses: actions/cache@v4
        with:
          path: /tmp/last-slots.json
          key: slots-${{ github.run_id }}
          restore-keys: slots-

      - name: Check slots and notify
        env:
          SITE_URL:             ${{ secrets.SITE_URL }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_WEEKDAY_MIN:   ${{ vars.NOTIFY_WEEKDAY_MIN || '17' }}
          NOTIFY_WEEKEND_MIN:   ${{ vars.NOTIFY_WEEKEND_MIN || '0' }}
          CACHE_FILE:           /tmp/last-slots.json
        run: node .github/scripts/check-and-notify.mjs

      - name: Save slots cache
        if: always()
        uses: actions/cache@v4
        with:
          path: /tmp/last-slots.json
          key: slots-${{ github.run_id }}
