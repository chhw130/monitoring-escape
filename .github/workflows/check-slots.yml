name: Check Keyescape Slots

on:
  schedule:
    - cron: '* * * * *'      # 1분마다 실행
  workflow_dispatch:          # 수동 실행 (테스트용)

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore last slots cache
        uses: actions/cache@v4
        with:
          path: /tmp/last-slots.json
          key: slots-${{ github.run_id }}
          restore-keys: slots-

      - name: Check slots and notify
        env:
          SITE_URL:             ${{ secrets.SITE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_FILE:           /tmp/last-slots.json
        run: node .github/scripts/check-and-notify.mjs

      - name: Save slots cache
        if: always()
        uses: actions/cache@v4
        with:
          path: /tmp/last-slots.json
          key: slots-${{ github.run_id }}
